name: Build HarmonyOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    # 设置 Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 设置 Java 17（鸿蒙需要）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 尝试使用 harmonyos-deploy 自动安装 SDK
    # 或者手动安装 hvigorw
    - name: Setup HarmonyOS Build Tools
      run: |
        # 创建项目级 hvigorw 脚本
        cat > hvigorw << 'EOF'
        #!/bin/bash
        # 项目级 hvigor wrapper
        
        # 尝试找到全局 hvigor
        if command -v hvigor &> /dev/null; then
          hvigor "$@"
        else
          echo "Error: hvigor not found"
          echo "Please install: npm install -g @ohos/hvigor-cli"
          exit 1
        fi
        EOF
        
        chmod +x hvigorw
        
        # 安装 hvigor CLI
        npm install -g @ohos/hvigor-cli || echo "Failed to install hvigor-cli"
        
        # 检查
        which hvigor || echo "hvigor not in PATH"
        ls -la hvigorw

    # 安装 harmonyos-deploy
    - name: Install harmonyos-deploy
      run: |
        npm install -g harmonyos-deploy
        
        # 验证安装
        harmonyos-deploy --version || echo "harmonyos-deploy installed"

    # 语法检查
    - name: Syntax Check
      run: |
        npm install -g typescript
        
        cat > check-syntax.js << 'EOF'
        const fs = require('fs');
        const path = require('path');
        
        function checkFiles(dir) {
          const files = fs.readdirSync(dir, { recursive: true });
          let hasError = false;
          let fileCount = 0;
          
          files.forEach(file => {
            if (typeof file === 'string' && file.endsWith('.ets')) {
              fileCount++;
              const fullPath = path.join(dir, file);
              const content = fs.readFileSync(fullPath, 'utf8');
              
              // 检查括号匹配
              const openBraces = (content.match(/{/g) || []).length;
              const closeBraces = (content.match(/}/g) || []).length;
              if (openBraces !== closeBraces) {
                console.error(`❌ Error: ${file} has mismatched braces (${openBraces} vs ${closeBraces})`);
                hasError = true;
              } else {
                console.log(`✓ ${file}`);
              }
            }
          });
          
          console.log(`\nChecked ${fileCount} .ets files`);
          return hasError;
        }
        
        const hasError = checkFiles('entry/src/main/ets');
        process.exit(hasError ? 1 : 0);
        EOF
        
        node check-syntax.js

    # 构建 HAP
    - name: Build HAP
      run: |
        if command -v harmonyos-deploy &> /dev/null && [ -d "$HOS_SDK" ]; then
          echo "=== Building with harmonyos-deploy ==="
          
          # 安装依赖
          npm install
          
          # 构建（跳过安装到设备，只编译）
          harmonyos-deploy --all --debug || {
            echo "Build may have failed, checking for output..."
          }
        else
          echo "⚠️ harmonyos-deploy or SDK not available"
          echo "Skipping build step"
        fi
        
        # 检查输出
        echo "=== Checking for build output ==="
        find . -name "*.hap" -o -name "*.hsp" 2>/dev/null | head -10

    # 上传构建产物
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: hap-output
        path: |
          entry/build/**/*.hap
          entry/build/**/*.hsp
          build/**/*.hap
          build/**/*.hsp
          **/*.log
        retention-days: 7
        if-no-files-found: warn

    # 创建 Release（仅标签推送）
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          entry/build/**/*.hap
          build/**/*.hap
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
