name: Build HarmonyOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    # 设置 Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 设置 Java 17（鸿蒙需要）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 下载华为命令行工具 (command-line-tools)
    - name: Download Huawei Command Line Tools
      run: |
        mkdir -p $HOME/hos-tools
        cd $HOME/hos-tools
        
        # 尝试多个下载源
        TOOL_URLS=(
          "https://repo.huaweicloud.com/harmonyos/command-line-tools/5.0.3.906/command-line-tools-linux-x64-5.0.3.906.zip"
          "https://contentcenter-vali-drcn.dbankcdn.cn/pvt_2/DeveloperAlliance_package_901_9/b1/v3/8q0g0tqo/v2/command-line-tools-linux-x64-5.0.3.906.zip"
        )
        
        DOWNLOADED=false
        for URL in "${TOOL_URLS[@]}"; do
          echo "Trying: $URL"
          if wget -q --timeout=120 "$URL" -O command-line-tools.zip; then
            echo "Downloaded successfully"
            DOWNLOADED=true
            break
          else
            echo "Failed, trying next..."
          fi
        done
        
        if [ "$DOWNLOADED" = true ]; then
          echo "Extracting tools..."
          unzip -q command-line-tools.zip
          
          # 找到 sdkmgr
          find . -name "sdkmgr" -type f 2>/dev/null | head -1
          
          # 设置环境变量
          echo "$HOME/hos-tools/command-line-tools/bin" >> $GITHUB_PATH
          echo "HOS_CMD_TOOLS=$HOME/hos-tools/command-line-tools" >> $GITHUB_ENV
          
          echo "Command line tools installed"
          ls -la
        else
          echo "Failed to download command line tools"
          echo "Will try npm packages instead"
        fi

    # 使用 sdkmgr 下载 SDK
    - name: Install SDK with sdkmgr
      run: |
        if command -v sdkmgr &> /dev/null; then
          echo "=== Installing SDK with sdkmgr ==="
          
          # 列出可用的 SDK
          sdkmgr list packages || echo "Failed to list packages"
          
          # 安装 API 9 SDK
          sdkmgr install packages apiVersion=9 || echo "Failed to install SDK"
          
          # 设置 SDK 路径
          echo "HOS_SDK=$HOME/hos-sdk" >> $GITHUB_ENV
          echo "$HOME/hos-sdk/toolchains" >> $GITHUB_PATH
        else
          echo "sdkmgr not found, skipping SDK installation"
        fi

    # 备用：尝试 npm 安装 hvigor
    - name: Setup npm-based build tools
      run: |
        # 安装 hvigor CLI
        npm install -g @ohos/hvigor-cli || echo "Failed to install hvigor-cli"
        
        # 创建项目级 hvigorw
        cat > hvigorw << 'EOF'
        #!/bin/bash
        if command -v hvigor &> /dev/null; then
          hvigor "$@"
        else
          echo "Error: hvigor not found"
          exit 1
        fi
        EOF
        chmod +x hvigorw

    # 安装 harmonyos-deploy
    - name: Install harmonyos-deploy
      run: |
        npm install -g harmonyos-deploy
        
        # 验证安装
        harmonyos-deploy --version || echo "harmonyos-deploy installed"

    # 语法检查
    - name: Syntax Check
      run: |
        npm install -g typescript
        
        cat > check-syntax.js << 'EOF'
        const fs = require('fs');
        const path = require('path');
        
        function checkFiles(dir) {
          const files = fs.readdirSync(dir, { recursive: true });
          let hasError = false;
          let fileCount = 0;
          
          files.forEach(file => {
            if (typeof file === 'string' && file.endsWith('.ets')) {
              fileCount++;
              const fullPath = path.join(dir, file);
              const content = fs.readFileSync(fullPath, 'utf8');
              
              // 检查括号匹配
              const openBraces = (content.match(/{/g) || []).length;
              const closeBraces = (content.match(/}/g) || []).length;
              if (openBraces !== closeBraces) {
                console.error(`❌ Error: ${file} has mismatched braces (${openBraces} vs ${closeBraces})`);
                hasError = true;
              } else {
                console.log(`✓ ${file}`);
              }
            }
          });
          
          console.log(`\nChecked ${fileCount} .ets files`);
          return hasError;
        }
        
        const hasError = checkFiles('entry/src/main/ets');
        process.exit(hasError ? 1 : 0);
        EOF
        
        node check-syntax.js

    # 构建 HAP
    - name: Build HAP
      run: |
        if command -v harmonyos-deploy &> /dev/null && [ -d "$HOS_SDK" ]; then
          echo "=== Building with harmonyos-deploy ==="
          
          # 安装依赖
          npm install
          
          # 构建（跳过安装到设备，只编译）
          harmonyos-deploy --all --debug || {
            echo "Build may have failed, checking for output..."
          }
        else
          echo "⚠️ harmonyos-deploy or SDK not available"
          echo "Skipping build step"
        fi
        
        # 检查输出
        echo "=== Checking for build output ==="
        find . -name "*.hap" -o -name "*.hsp" 2>/dev/null | head -10

    # 上传构建产物
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: hap-output
        path: |
          entry/build/**/*.hap
          entry/build/**/*.hsp
          build/**/*.hap
          build/**/*.hsp
          **/*.log
        retention-days: 7
        if-no-files-found: warn

    # 创建 Release（仅标签推送）
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          entry/build/**/*.hap
          build/**/*.hap
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
